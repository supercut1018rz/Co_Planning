<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Maps JS API Sanity Check</title>
    <style>#map{height:400px;width:100%}</style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCjoE-bGLi1fgetUPSunTPcrxtFdxrtY1Iy"></script>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 40.7128, lng: -74.0060 }, zoom: 11
      });
      new google.maps.Marker({ position: { lat: 40.7128, lng: -74.0060 }, map });
    </script>
  </body>
</html>
